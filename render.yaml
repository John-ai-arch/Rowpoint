# One-click Render.com blueprint: push this repo to GitHub, then in Render
# choose "New +" → "Blueprint" → pick the repo. Render reads this file and
# sets everything up (web service + persistent disk + env vars).
services:
  - type: web
    name: rowpoint
    runtime: node
    plan: free          # persistent disks require a paid instance
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: ROWPOINT_DATA_DIR
        value: /var/data
      # Secrets pinned as env vars so every session and research pseudonym
      # survives even a disk migration — Render generates the values once and
      # keeps them across deploys. (Without these the app persists them to the
      # data disk, which also works as long as the disk itself persists.)
      - key: ROWPOINT_TOKEN_SECRET
        generateValue: true
      - key: ROWPOINT_RESEARCH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false        # Render prompts you for this at deploy time
      - key: MAIL_FROM
        value: "RowPoint <onboarding@resend.dev>"
